{% load static %}
{% load bootstrap5 %}
<!DOCTYPE html>
<html lang="cs">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}Edonius{% endblock %}</title>
        {% bootstrap_css %}
        <link rel="stylesheet" href="{% static 'css/main.css' %}">
        {% bootstrap_javascript %}
    </head>
    <body class="d-flex flex-column min-vh-100">
        <header>
            {% include 'navbar.html' %}
        </header>

        <div class="d-flex flex-grow-1">
            <aside class="sidebar">
                {% include "sidebar.html" %}
            </aside>
            <main class="flex-grow-1">
                {% block content %}
                
                {% endblock %}
            </main>
        </div>

        <footer class="py-3 bg-light text-center text-muted mt-auto">
            <p>&copy; 2026 Edonius. Všechna práva vyhrazena.</p>
        </footer>
    </body>
</html>
