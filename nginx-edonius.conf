upstream gunicorn_edonius {
    server 127.0.0.1:8013;
}

# HTTP (before SSL certificate is obtained)
server {
    listen 80;
    server_name edonius.hs-dev.cz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /static/ {
        alias /srv/apps/13_Edonius/staticfiles/;
    }

    location / {
        include proxy_params;
        proxy_pass http://gunicorn_edonius;
    }
}
